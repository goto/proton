syntax = "proto3";

package gotocompany.optimus.core.v1beta1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/goto/proton/optimus";
option java_multiple_files = true;
option java_outer_classname = "BackfillServiceManager";
option java_package = "com.gotocompany.proton.optimus";

service BackfillService {
  rpc CreateBackfill(CreateBackfillRequest) returns (CreateBackfillResponse) {
    option (google.api.http) = {
      post: "/v1beta1/project/{project_name}/backfill"
      body: "*"
    };
  }

  rpc BackfillPreview(BackfillPreviewRequest) returns (BackfillPreviewResponse) {
    option (google.api.http) = {
      post: "/v1beta1/project/{project_name}/backfill-preview"
      body: "*"
    };
  }

  rpc GetBackfills(GetBackfillsRequest) returns (GetBackfillsResponse) {
    option (google.api.http) = {
      get: "/v1beta1/project/{project_name}/backfill"
    };
  }

  rpc CancelBackfill(CancelBackfillRequest) returns (CancelBackfillResponse) {
    option (google.api.http) = {
      put: "/v1beta1/project/{project_name}/backfill/{backfill_id}/cancel"
    };
  }
}

message CreateBackfillRequest {
  string project_name   = 1;
  string job_name       = 2;
  string namespace_name = 3;

  google.protobuf.Timestamp data_start_time = 4;
  google.protobuf.Timestamp data_end_time   = 5;

  string job_config                     = 6;
  map<string, string> overridden_assets = 7;

  string description = 8;
  string category    = 9;
  string approval_id = 10;
  string user_id     = 11;
}

message CreateBackfillResponse {
  string id         = 1;
  string dag_run_id = 2;
}

message BackfillPreviewRequest {
  string project_name   = 1;
  string job_name       = 2;
  string namespace_name = 3;

  google.protobuf.Timestamp data_start_time = 4;
  google.protobuf.Timestamp data_end_time   = 5;

  string job_config                     = 6;
  map<string, string> overridden_assets = 7;

  string description = 8;
  string category    = 9;
  string approval_id = 10;
  string user_id     = 11;
}

message BackfillCompiledAssets {
  map<string, string> envs    = 1;
  map<string, string> files   = 2;
}

message BackfillPreviewResponse {
  BackfillCompiledAssets compiled_assets = 1;
}

message GetBackfillsRequest {
  string project_name       = 1;
  string scheduler_run_id   = 2;
  repeated string job_names = 3;
  string status             = 4;
  string approval_id        = 5;
  string user_id            = 6;
  string backfill_id        = 7;
}

message BackfillSpec {
  string id                            = 1;
  string scheduler_run_id              = 2;
  string project_name                  = 3;
  string namespace_name                = 4;
  string job_name                      = 5;
  string description                   = 6;

  google.protobuf.Timestamp data_start_time = 7;
  google.protobuf.Timestamp data_end_time   = 8;
  google.protobuf.Timestamp start_time      = 9;
  google.protobuf.Timestamp end_time        = 10;

  map<string, string> overridden_assets    = 11;
  string job_config                    = 12;
  string status                        = 13;
  string message                       = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
  string category                      = 17;
  string approval_id                   = 18;
  string user_id                       = 19;
}

message GetBackfillsResponse {
  repeated BackfillSpec backfills = 1;
}

message CancelBackfillRequest {
  string project_name = 1;
  string backfill_id  = 2;
  string canceled_by  = 3;
}

message CancelBackfillResponse {
  BackfillSpec backfill = 1;
}
